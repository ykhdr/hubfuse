version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    paths:
      - proto
    rules:
      - linters:
          - errcheck
        source: "\\.(Close|Stop)\\("
      # SA9003 ("empty branch") flags the pattern
      #   if err := x(); err != nil { /* comment */ }
      # which we use intentionally to document "we don't care about
      # this error" with a local note. The explicit if-form is clearer
      # than `_ = x()` when the reason deserves a comment.
      - linters:
          - staticcheck
        text: "SA9003:"
