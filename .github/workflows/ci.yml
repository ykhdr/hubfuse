name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:
  workflow_dispatch:
    inputs:
      run_scenarios_only:
        description: "Run only scenario tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  GO_VERSION: "1.25.0"

jobs:
  build:
    name: Build
    if: github.event_name != 'workflow_dispatch' || inputs.run_scenarios_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build all packages
        run: make build

      - name: Build binaries
        run: |
          go build -o hubfuse-hub ./cmd/hubfuse-hub/
          go build -o hubfuse ./cmd/hubfuse/

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            hubfuse-hub
            hubfuse
          retention-days: 7

  vet:
    name: Vet
    if: github.event_name != 'workflow_dispatch' || inputs.run_scenarios_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet
        run: make vet

  lint:
    name: Lint
    if: github.event_name != 'workflow_dispatch' || inputs.run_scenarios_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  test-unit:
    name: Unit Tests
    if: github.event_name != 'workflow_dispatch' || inputs.run_scenarios_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run unit tests
        run: make test-unit

  test-integration:
    name: Integration Tests
    if: github.event_name != 'workflow_dispatch' || inputs.run_scenarios_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run integration tests
        run: make test-integration

  test-cli:
    name: CLI Tests
    if: github.event_name != 'workflow_dispatch' || inputs.run_scenarios_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run CLI tests
        run: make test-cli

  test-scenarios:
    name: Scenario Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'merge_group' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run scenario tests
        run: make test-scenarios

  proto-check:
    name: Proto Staleness Check
    if: github.event_name != 'workflow_dispatch' || inputs.run_scenarios_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "23.2"

      - name: Install Go protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.33.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0

      - name: Regenerate proto
        run: make proto-gen

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated proto files are out of date. Run 'make proto-gen' and commit the result."
            git diff --stat
            git diff
            exit 1
          fi
